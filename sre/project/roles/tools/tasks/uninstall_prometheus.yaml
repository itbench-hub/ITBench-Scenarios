---
- name: Uninstall Prometheus on Kubernetes
  when:
    - tools_cluster.platform == "kubernetes"
  block:
    - name: Uninstall Prometheus Operator and Prometheus
      kubernetes.core.helm:
        kubeconfig: "{{ tools_cluster.kubeconfig }}"
        release_name: "{{ tools_helm_releases.prometheus.name }}"
        release_namespace: "{{ tools_helm_releases.prometheus.namespace }}"
        release_state: absent
        wait: true

    - name: Delete the release namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ tools_cluster.kubeconfig }}"
        resource_definition:
          api_version: v1
          kind: Namespace
          metadata:
            name: "{{ tools_helm_releases.prometheus.namespace }}"
        state: absent
        wait: true

    - name: Remove the Prometheus Operator related CRDs from the cluster
      kubernetes.core.k8s:
        kubeconfig: "{{ tools_cluster.kubeconfig }}"
        resource_definition:
          api_version: "{{ crd.apiVersion }}"
          kind: "{{ crd.kind }}"
          metadata:
            name: "{{ crd.metadata.name }}"
        state: absent
        wait: true
      loop: |
        {{
          tools_crd_info.resources |
          selectattr('spec.group', '==', 'monitoring.coreos.com')
        }}
      loop_control:
        label: customresourcedefinition/{{ crd.metadata.name }}
        loop_var: crd

- name: Uninstall Prometheus on OpenShift
  when:
    - tools_cluster.platform == "openshift"
  block:
    - name: Disable OpenShift user workload monitoring
      kubernetes.core.k8s:
        kubeconfig: "{{ tools_cluster.kubeconfig }}"
        state: absent
        src: files/openshift/user-workload-monitoring-config.yaml
