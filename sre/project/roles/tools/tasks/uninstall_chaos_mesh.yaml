---
- name: Uninstall Chaos Mesh
  kubernetes.core.helm:
    kubeconfig: "{{ tools_cluster.kubeconfig }}"
    release_name: "{{ tools_helm_releases.chaos_mesh.name }}"
    release_namespace: "{{ tools_helm_releases.chaos_mesh.namespace }}"
    release_state: absent
    wait: true

- name: Delete the release namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ tools_cluster.kubeconfig }}"
    resource_definition:
      api_version: v1
      kind: Namespace
      metadata:
        name: "{{ tools_helm_releases.chaos_mesh.namespace }}"
    state: absent
    wait: true

- name: Delete SCC for Chaos Mesh
  kubernetes.core.k8s:
    kubeconfig: "{{ tools_cluster.kubeconfig }}"
    resource_definition:
      apiVersion: security.openshift.io/v1
      kind: SecurityContextConstraints
      metadata:
        name: it-bench-chaos-daemon-restricted
    state: absent
    wait: true
  when:
    - tools_cluster.platform == "openshift"

- name: Remove Chaos Mesh related CRDs from the cluster
  kubernetes.core.k8s:
    kubeconfig: "{{ tools_cluster.kubeconfig }}"
    resource_definition:
      api_version: "{{ crd.apiVersion }}"
      kind: "{{ crd.kind }}"
      metadata:
        name: "{{ crd.metadata.name }}"
    state: absent
    wait: true
  loop: |
    {{
      tools_crd_info.resources |
      selectattr('spec.group', '==', 'chaos-mesh.org')
    }}
  loop_control:
    label: customresourcedefinition/{{ crd.metadata.name }}
    loop_var: crd
