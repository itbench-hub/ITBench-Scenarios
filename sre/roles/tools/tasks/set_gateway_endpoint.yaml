---
- name: Retrive tool stack gateway
  kubernetes.core.k8s_info:
    api_version: gateway.networking.k8s.io/v1
    kind: Gateway
    kubeconfig: "{{ tools_cluster.kubeconfig }}"
    name: "{{ tools_instances.kubernetes_gateways.names.tools }}"
    namespace: "{{ tools_instances.kubernetes_gateways.namespace }}"
    wait: true
  register: tools_gateway_info
  until:
    - tools_gateway_info.resources | length == 1
    - tools_gateway_info.resources[0].status.addresses is defined
    - tools_gateway_info.resources[0].status.addresses | length > 0
  delay: 15
  retries: 20

- name: Extract tool stack gateway address
  ansible.builtin.set_fact:
    tools_gateway_http_endpoint: "http://{{ tools_gateway_info.resources[0].status.addresses[0].value }}:80"
  when:
    - tools_gateway_info is defined
