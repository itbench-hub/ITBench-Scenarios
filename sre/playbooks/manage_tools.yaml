---
- name: Manage SRE and FinOps Incident Environment Tool Stack
  hosts:
    - environment
  pre_tasks:
    - name: Import system role
      ansible.builtin.import_role:
        name: system
      tags:
        - always
      vars:
        system_cluster:
          kubeconfig: "{{ cluster.kubeconfig }}"

    - name: Import cluster role
      ansible.builtin.import_role:
        name: cluster
      tags:
        - always
      vars:
        cluster_files:
          kubeconfig: "{{ cluster.kubeconfig }}"
        cluster_tools_enabled:
          oc: "{{ system_oc_exists }}"

    - name: Import variables for incident
      ansible.builtin.import_role:
        name: incidents
        tasks_from: load
      tags:
        - always
      vars:
        incidents_file:
          id: "{{ incident_id }}"
      when:
        - incident_id is defined

    - name: Create leaderboard_incident dictionary
      ansible.builtin.set_fact:
        leaderboard_incident:
          id: "{{ incident_id }}"
      when:
        - incident_id is defined

    - name: Create tools_enabled dictionary
      ansible.builtin.set_fact:
        tools_enabled:
          chaos_mesh: "{{ tools.chaos_mesh | default(false) }}"
          clickhouse: "{{ tools.clickhouse | default(false) }}"
          ingress: "{{ tools.ingress | default(false) }}"
          jaeger: "{{ tools.jaeger | default(false) }}"
          kubernetes_metrics_server: "{{ tools.kubernetes_metrics_server | default(false) }}"
          kubernetes_topology_monitor: "{{ tools.kubernetes_topology_monitor | default(false) }}"
          opencost: "{{ tools.opencost | default(false) }}"
          opensearch: "{{ tools.opensearch | default(false) }}"
          opentelemetry: "{{ tools.opentelemetry | default(false) }}"
          prometheus: "{{ tools.prometheus | default(false) }}"
      tags:
        - always
      when:
        - incident_id is undefined
  tasks:
    - name: Import required roles
      block:
        - name: Import leaderboard role
          ansible.builtin.import_role:
            name: leaderboard
          vars:
            leaderboard_status:
              status: progressing

        - name: Import tools role
          ansible.builtin.import_role:
            name: tools
          vars:
            tools_cluster:
              provider: "{{ cluster_provider }}"
              kubeconfig: "{{ cluster.kubeconfig }}"
              platform: "{{ cluster_platform }}"

        - name: Import leaderboard role
          ansible.builtin.import_role:
            name: leaderboard
          vars:
            leaderboard_status:
              status: succeeded
      rescue:
        - name: Import leaderboard role
          ansible.builtin.import_role:
            name: leaderboard
          vars:
            leaderboard_status:
              failed_task:
                name: "{{ ansible_failed_task.name }}"
                result: "{{ ansible_failed_result }}"
              status: failed

        - name: Fail playbook
          ansible.builtin.fail:
            msg: Failing playbook
