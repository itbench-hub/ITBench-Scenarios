---
- name: Manage SRE and FinOps Incident Environment Sample Application Stack
  hosts:
    - environment
  pre_tasks:
    - name: Import system role
      ansible.builtin.import_role:
        name: system
      tags:
        - always
      vars:
        system_cluster:
          kubeconfig: "{{ cluster.kubeconfig }}"

    - name: Import cluster role
      ansible.builtin.import_role:
        name: cluster
      tags:
        - always
      vars:
        cluster_files:
          kubeconfig: "{{ cluster.kubeconfig }}"
        cluster_tools_enabled:
          oc: "{{ system_oc_exists }}"

    - name: Import variables for incident
      ansible.builtin.import_role:
        name: incidents
        tasks_from: load
      tags:
        - always
      vars:
        incidents_file:
          id: "{{ incident_id }}"
      when:
        - incident_id is defined

    - name: Create applications_enabled dictionary
      ansible.builtin.set_fact:
        applications_enabled:
          otel_demo: "{{ applications.otel_demo | default(false) }}"
      tags:
        - always
      when:
        - incident_id is undefined
  tasks:
    - name: Import required roles
      block:
        - name: Import leaderboard role
          ansible.builtin.import_role:
            name: leaderboard
          vars:
            leaderboard_status:
              status: progressing

        - name: Import applications role
          ansible.builtin.import_role:
            name: applications
          vars:
            applications_cluster:
              cloud_provider: "{{ cluster_provider }}"
              kubeconfig: "{{ cluster.kubeconfig }}"
              platform: "{{ cluster_platform }}"

        - name: Import leaderboard role
          ansible.builtin.import_role:
            name: leaderboard
          vars:
            leaderboard_status:
              status: succeeded
      rescue:
        - name: Import leaderboard role
          ansible.builtin.import_role:
            name: leaderboard
          vars:
            leaderboard_status:
              failed_task:
                name: "{{ ansible_failed_task.name }}"
                result: "{{ ansible_failed_result }}"
              status: failed

        - name: Fail playbook
          ansible.builtin.fail:
            msg: Failing playbook
